<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Pulse API - Swagger UI</title>
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui.css" >
    <link rel="icon" type="image/png" href="https://unpkg.com/swagger-ui-dist@5.11.0/favicon-32x32.png" sizes="32x32" />
    <style>
        html { box-sizing: border-box; overflow: -moz-scrollbars-vertical; overflow-y: scroll; }
        *, *:before, *:after { box-sizing: inherit; }
        body { margin:0; background: #0f172a; }
        .swagger-ui .topbar { display: none; }
        .swagger-ui .info .title { color: #f1f5f9; }
        .swagger-ui .info li, .swagger-ui .info p, .swagger-ui .info table { color: #94a3b8; }
        .swagger-ui .opblock-tag { color: #f1f5f9; border-bottom: 1px solid #1e293b; }
        .swagger-ui .opblock .opblock-summary-path { color: #f1f5f9; }
    </style>
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-bundle.js"> </script>
    <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-standalone-preset.js"> </script>
    <script>
    window.onload = function() {
      const ui = SwaggerUIBundle({
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ],
        layout: "BaseLayout",
        spec: {
          "openapi": "3.0.0",
          "info": {
            "title": "Student Pulse API",
            "description": "API d'analyse des sentiments pour la Faculté des Sciences - Université de Yaoundé I",
            "version": "1.0.0"
          },
          "servers": [
            {
              "url": "https://onana-gregoire-24g2060.onrender.com",
              "description": "Serveur de Production (Render)"
            }
          ],
          "paths": {
            "/api/ping": {
              "get": {
                "summary": "Vérifier l'état du serveur",
                "responses": {
                  "200": { "description": "Réponse 'pong'" }
                }
              }
            },
            "/api/courses": {
              "get": {
                "summary": "Lister toutes les Unités d'Enseignement",
                "responses": {
                  "200": { "description": "Liste des cours" }
                }
              }
            },
            "/api/stats/{course_id}": {
              "get": {
                "summary": "Obtenir les statistiques de sentiment pour une UE",
                "parameters": [
                  { "name": "course_id", "in": "path", "required": true, "schema": { "type": "integer" } }
                ],
                "responses": {
                  "200": { "description": "Données statistiques (positif, neutre, négatif)" }
                }
              }
            },
            "/api/analysis/{course_id}": {
              "get": {
                "summary": "Générer une analyse IA pour une UE",
                "description": "Extrait des mots-clés et génère un résumé en langage naturel.",
                "parameters": [
                  { "name": "course_id", "in": "path", "required": true, "schema": { "type": "integer" } }
                ],
                "responses": {
                  "200": { "description": "Analyse textuelle et mots-clés" }
                }
              }
            },
            "/api/feedbacks/{course_id}": {
              "get": {
                "summary": "Lister les feedbacks récents d'une UE",
                "parameters": [
                  { "name": "course_id", "in": "path", "required": true, "schema": { "type": "integer" } }
                ],
                "responses": {
                  "200": { "description": "Liste des messages récents" }
                }
              }
            },
            "/api/feedback": {
              "post": {
                "summary": "Soumettre un nouveau feedback",
                "requestBody": {
                  "required": true,
                  "content": {
                    "application/json": {
                      "schema": {
                        "type": "object",
                        "properties": {
                          "course_id": { "type": "integer" },
                          "student_name": { "type": "string" },
                          "content": { "type": "string" }
                        }
                      }
                    }
                  }
                },
                "responses": {
                  "200": { "description": "Feedback enregistré et analysé" }
                }
              }
            }
          }
        }
      });
      window.ui = ui;
    };
  </script>
</body>
</html>
